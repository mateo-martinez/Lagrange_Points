<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mission Control V27</title>

<style>
body{margin:0;background:#020611;color:#00eaff;font-family:monospace;overflow:hidden}
#ui{position:absolute;top:10px;left:10px;width:320px}
.panel{background:rgba(0,20,40,.9);border:1px solid #00eaff;padding:10px;margin-bottom:10px}
#log{position:absolute;bottom:0;left:0;right:0;height:180px;background:black;overflow:auto;padding:6px;font-size:12px}
button{width:100%;margin-top:4px;padding:6px;background:#001820;color:#00eaff;border:1px solid #00eaff}
</style>
</head>

<body>

<div id="ui">
<div class="panel">
<button onclick="startCountdown()">START COUNTDOWN</button>
<button onclick="autoMission()">AUTO MISSION</button>
</div>

<div class="panel" id="tele"></div>
</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.001,100)
camera.position.set(0,-2.5,1.5)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0x666666))
const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(3,3,3)
scene.add(light)

// ===== EARTH =====
const earthR=0.12
const earth=new THREE.Mesh(
new THREE.SphereGeometry(earthR,64,64),
new THREE.MeshPhongMaterial({color:0x2266ff})
)
scene.add(earth)

// ===== MOON =====
const moon=new THREE.Mesh(
new THREE.SphereGeometry(0.04,32,32),
new THREE.MeshPhongMaterial({color:0xaaaaaa})
)
scene.add(moon)

let moonOrbit=1
let moonAngle=0

// ===== SAT =====
const sat=new THREE.Mesh(
new THREE.SphereGeometry(0.01),
new THREE.MeshBasicMaterial({color:0xffffff})
)
scene.add(sat)

// ===== TRAIL =====
let trail=[]
const trailGeo=new THREE.BufferGeometry()
const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({color:0x00ffff}))
scene.add(trailLine)

// ===== LAGRANGE =====
let lagPoints=[]
for(let i=0;i<5;i++){
let p=new THREE.Mesh(
new THREE.SphereGeometry(0.01),
new THREE.MeshBasicMaterial({color:0xff00ff})
)
scene.add(p)
lagPoints.push(p)
}

// ===== STATE =====
let phase="PRELAUNCH"
let pos=new THREE.Vector2(earthR,0)
let vel=new THREE.Vector2(0,0)

// ===== LOG =====
function log(t){
let el=document.getElementById("log")
el.innerHTML+="<br>> "+t
el.scrollTop=el.scrollHeight
}

// ===== COUNTDOWN =====
function startCountdown(){
let t=10
phase="COUNTDOWN"
log("T-10 Initiated")

let i=setInterval(()=>{
t--
log("T-"+t)
if(t==0){
clearInterval(i)
setPhase("LIFTOFF")
}
},1000)
}

// ===== CONTROL =====
function setPhase(p){
phase=p
log("Phase: "+p)
}

// ===== AUTO =====
function autoMission(){
startCountdown()
setTimeout(()=>setPhase("TURN"),12000)
setTimeout(()=>setPhase("ORBIT"),20000)
}

// ===== PHYSICS =====
function step(){

// moon motion
moonAngle+=0.002
moon.position.set(Math.cos(moonAngle)*moonOrbit,Math.sin(moonAngle)*moonOrbit,0)

// Lagrange dynamic
let mx=moon.position.x
let my=moon.position.y

lagPoints[0].position.set(mx*0.85,my*0.85,0)
lagPoints[1].position.set(mx*1.15,my*1.15,0)
lagPoints[2].position.set(mx*0.5-my*0.3,my*0.5+mx*0.3,0)
lagPoints[3].position.set(mx*0.5+my*0.3,my*0.5-mx*0.3,0)
lagPoints[4].position.set(mx,my,0)

// PRELAUNCH
if(phase==="PRELAUNCH") return

let radial=pos.clone().normalize()
let tangent=new THREE.Vector2(-pos.y,pos.x).normalize()

// CONTROLLED THRUST
if(phase==="LIFTOFF"){
vel.add(radial.multiplyScalar(0.001))
}

if(phase==="TURN"){
vel.add(tangent.multiplyScalar(0.001))
}

if(phase==="ORBIT"){
let target=0.35
let error=target-pos.length()

vel.add(tangent.multiplyScalar(0.0008))
vel.add(radial.multiplyScalar(error*0.002))
}

// ===== GRAVITY (semi-stable) =====
let dx=-pos.x, dy=-pos.y
let d=Math.hypot(dx,dy)+1e-5

vel.x+=dx/(d*d*d)*0.008
vel.y+=dy/(d*d*d)*0.008

// integrate
pos.x+=vel.x
pos.y+=vel.y

// ===== TRAIL =====
trail.push(new THREE.Vector3(pos.x,pos.y,0))
if(trail.length>2000) trail.shift()
trailGeo.setFromPoints(trail)

// ===== TELEMETRY =====
document.getElementById("tele").innerHTML=
"Phase: "+phase+"<br>"+
"Velocity: "+vel.length().toFixed(4)+"<br>"+
"Altitude: "+(pos.length()-earthR).toFixed(4)+"<br>"+
"Orbit Error: "+(0.35-pos.length()).toFixed(4)

}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate)
step()

sat.position.set(pos.x,pos.y,0)

controls.update()
renderer.render(scene,camera)
}

animate()

</script>
</body>
</html>
