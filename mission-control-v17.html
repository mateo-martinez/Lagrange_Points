<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mission Control V17</title>

<style>
body{margin:0;overflow:hidden;background:#020611;color:#0ff;font-family:monospace}
#ui{position:absolute;top:10px;left:10px;width:280px}
.panel{background:rgba(0,20,40,.85);padding:10px;border:1px solid #0ff;margin-bottom:10px}
#log{position:absolute;bottom:0;left:0;right:0;height:150px;background:black;border-top:1px solid #0ff;overflow:auto;font-size:12px;padding:6px}
button{width:100%;margin-top:5px;padding:6px;background:#011;color:#0ff;border:1px solid #0ff}
</style>
</head>

<body>

<div id="ui">
<div class="panel">
<button onclick="start()">START MISSION</button>
<button onclick="speed=1">x1</button>
<button onclick="speed=5">x5</button>
<button onclick="speed=20">x20</button>
<button onclick="zoom(-0.2)">ZOOM IN</button>
<button onclick="zoom(0.2)">ZOOM OUT</button>
</div>

<div class="panel">
<div id="tele"></div>
</div>
</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.001,100)
camera.position.set(0,-2.5,1.2)
camera.lookAt(0,0,0)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0x555555))
const light=new THREE.DirectionalLight(0xffffff,1.5)
light.position.set(3,3,3)
scene.add(light)

// ===== TEXTURES =====
const loader=new THREE.TextureLoader()

const earth=new THREE.Mesh(
new THREE.SphereGeometry(0.12,64,64),
new THREE.MeshPhongMaterial({
map:loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg")
})
)
scene.add(earth)

// ===== SAT =====
const sat=new THREE.Mesh(
new THREE.SphereGeometry(0.01,16,16),
new THREE.MeshBasicMaterial({color:0xffffff})
)
scene.add(sat)

// ===== TRAIL =====
let trail=[]
const trailGeo=new THREE.BufferGeometry()
const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({color:0x00ffff}))
scene.add(trailLine)

// ===== STATE =====
let pos=new THREE.Vector2(0.12,0)
let vel=new THREE.Vector2(0,0)
let acc=new THREE.Vector2(0,0)

let phase="IDLE"
let speed=1

// ===== LOG =====
function log(m){
let el=document.getElementById("log")
el.innerHTML+="<br>> "+m
el.scrollTop=el.scrollHeight
}

// ===== AUTOPILOT =====
function autopilot(){

let r=pos.length()
let tangent=new THREE.Vector2(-pos.y,pos.x).normalize()

if(phase==="LIFTOFF"){
acc.copy(pos.clone().normalize().multiplyScalar(2.5)) // fuerte
if(r>0.18){
phase="PITCH"
log("Pitch maneuver")
}
}

else if(phase==="PITCH"){
acc.copy(tangent.multiplyScalar(2.0))
if(r>0.25){
phase="ASCENT"
log("Gravity turn")
}
}

else if(phase==="ASCENT"){
acc.copy(tangent.multiplyScalar(1.2))
if(r>0.35){
phase="CIRCULARIZE"
log("Orbit insertion")
}
}

else if(phase==="CIRCULARIZE"){
let vReq=Math.sqrt(1/r)
let v=vel.length()

acc.copy(tangent.multiplyScalar(0.8))

if(Math.abs(v-vReq)<0.05){
phase="ORBIT"
log("Stable orbit achieved")
}
}

else if(phase==="ORBIT"){
acc.set(0,0)
}
}

// ===== PHYSICS =====
function step(dt){

// gravity
let dx=-pos.x, dy=-pos.y
let r=Math.hypot(dx,dy)+1e-5
let grav=new THREE.Vector2(dx/(r*r*r),dy/(r*r*r))

autopilot()

let totalAcc=grav.add(acc)

// integrate
vel.add(totalAcc.multiplyScalar(dt))
pos.add(vel.clone().multiplyScalar(dt))

// collision Earth
if(pos.length()<0.12){
let n=pos.clone().normalize()
pos.copy(n.multiplyScalar(0.12))
vel.multiplyScalar(0.3)
}

// telemetry
let v=vel.length()
let alt=pos.length()-0.12
let vReq=Math.sqrt(1/pos.length())

document.getElementById("tele").innerHTML=
"Phase: "+phase+"<br>"+
"Alt: "+alt.toFixed(3)+"<br>"+
"Vel: "+v.toFixed(3)+"<br>"+
"Orbital V: "+vReq.toFixed(3)+"<br>"+
"Error: "+Math.abs(v-vReq).toFixed(3)
}

// ===== CONTROLS =====
function start(){
phase="LIFTOFF"
vel.set(0,0)
log("Launch initiated")
}

function zoom(z){
camera.position.multiplyScalar(1+z)
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate)

for(let i=0;i<speed;i++){
step(0.01)
}

// trail
trail.push(new THREE.Vector3(pos.x,pos.y,0))
if(trail.length>2000) trail.shift()
trailGeo.setFromPoints(trail)

sat.position.set(pos.x,pos.y,0)

renderer.render(scene,camera)
}

animate()

</script>
</body>
</html>
