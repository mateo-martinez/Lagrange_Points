<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mission Control V21</title>

<style>
body{margin:0;background:#030711;color:#00eaff;font-family:monospace;overflow:hidden}

#ui{
position:absolute;top:10px;left:10px;width:340px
}

.panel{
background:rgba(0,20,40,.9);
border:1px solid #00eaff;
padding:10px;margin-bottom:10px
}

#log{
position:absolute;bottom:0;left:0;right:0;height:180px;
background:#000;border-top:1px solid #00eaff;
overflow:auto;font-size:12px;padding:6px
}

button{
width:100%;padding:8px;margin-top:5px;
background:#001820;color:#00eaff;border:1px solid #00eaff
}

h3{margin:0 0 6px 0;font-size:14px}
</style>
</head>

<body>

<div id="ui">

<div class="panel">
<h3>MISSION CONTROL</h3>
<button onclick="startCountdown()">LAUNCH</button>
<button onclick="speed=1">x1</button>
<button onclick="speed=5">x5</button>
<button onclick="speed=20">x20</button>
</div>

<div class="panel">
<h3>SATELLITE TELEMETRY</h3>
<div id="tele"></div>
</div>

</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.001,100)
camera.position.set(0,-2.5,1.5)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

// ===== EARTH =====
const earthRadius=0.12
const earth=new THREE.Mesh(
new THREE.SphereGeometry(earthRadius,64,64),
new THREE.MeshPhongMaterial({color:0x2266ff})
)
scene.add(earth)

// ===== MOON =====
const moonRadius=0.04
const moonOrbitRadius=1
let moonAngle=0

const moon=new THREE.Mesh(
new THREE.SphereGeometry(moonRadius,32,32),
new THREE.MeshPhongMaterial({color:0xaaaaaa})
)
scene.add(moon)

// ===== SAT =====
const sat=new THREE.Mesh(
new THREE.SphereGeometry(0.01,16,16),
new THREE.MeshBasicMaterial({color:0xffffff})
)
scene.add(sat)

// ===== STATE =====
let pos=new THREE.Vector2(earthRadius,0)
let vel=new THREE.Vector2(0,0)

let phase="IDLE"
let missionTime=0
let distance=0
let temp=20
let speed=1
let countdown=0

// ===== LOG =====
function log(m){
let el=document.getElementById("log")
el.innerHTML+="<br>T+"+missionTime.toFixed(1)+" | "+m
el.scrollTop=el.scrollHeight
}

// ===== COUNTDOWN =====
function startCountdown(){
countdown=10
phase="COUNTDOWN"
log("Countdown initiated")
}

// ===== AUTOPILOT =====
function autopilot(){

let r=pos.length()
let radial=pos.clone().normalize()
let tangent=new THREE.Vector2(-pos.y,pos.x).normalize()

switch(phase){

case "COUNTDOWN":
countdown-=0.1
if(countdown<=0){
log("Engine ignition")
phase="LIFTOFF"
}
break

case "LIFTOFF":
vel.add(radial.multiplyScalar(0.02))
if(r>0.2){
log("Gravity turn initiated")
phase="TURN"
}
break

case "TURN":
vel.add(tangent.multiplyScalar(0.01))
if(r>0.3){
log("Orbit insertion burn")
phase="ORBIT"
}
break

case "ORBIT":
let vOrbit=Math.sqrt(1/r)
vel.lerp(tangent.multiplyScalar(vOrbit),0.05)
if(Math.abs(vel.length()-vOrbit)<0.01){
log("Stable Earth orbit achieved")
phase="TLI"
}
break

case "TLI":
vel.multiplyScalar(1.15)
log("Executing Trans Lunar Injection")
phase="COAST"
break

case "COAST":
if(distanceToMoon()<0.5){
log("Approaching Moon SOI")
phase="CAPTURE"
}
break

case "CAPTURE":
vel.multiplyScalar(0.8)
log("Lunar orbit insertion burn")
phase="DONE"
break
}
}

// ===== HELPERS =====
function distanceToMoon(){
return Math.hypot(pos.x-moon.position.x,pos.y-moon.position.y)
}

// ===== PHYSICS =====
function step(dt){

if(phase==="IDLE") return

missionTime+=dt

// moon motion
moonAngle+=0.005
moon.position.set(Math.cos(moonAngle)*moonOrbitRadius,Math.sin(moonAngle)*moonOrbitRadius,0)

// gravity Earth
let dx=-pos.x, dy=-pos.y
let r=Math.hypot(dx,dy)+1e-5
vel.x+=dx/(r*r*r)*dt
vel.y+=dy/(r*r*r)*dt

// gravity Moon
dx=moon.position.x-pos.x
dy=moon.position.y-pos.y
r=Math.hypot(dx,dy)+1e-5
vel.x+=0.0123*dx/(r*r*r)*dt
vel.y+=0.0123*dy/(r*r*r)*dt

autopilot()

pos.x+=vel.x*dt
pos.y+=vel.y*dt

distance+=vel.length()*dt*1000
temp=20+vel.length()*50

// ===== TELEMETRY =====
document.getElementById("tele").innerHTML=
"Phase: "+phase+"<br>"+
"Velocity: "+vel.length().toFixed(3)+"<br>"+
"Altitude: "+(pos.length()-earthRadius).toFixed(3)+"<br>"+
"Distance to orbit: "+Math.abs(vel.length()-Math.sqrt(1/pos.length())).toFixed(3)+"<br>"+
"Distance to Moon: "+distanceToMoon().toFixed(3)+"<br>"+
"Temperature: "+temp.toFixed(1)+" C<br>"+
"Distance traveled: "+distance.toFixed(0)+" km"
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate)

for(let i=0;i<speed;i++){
step(0.01)
}

sat.position.set(pos.x,pos.y,0)

controls.update()
renderer.render(scene,camera)
}

animate()

</script>
</body>
</html>
