<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mission Control V23</title>

<style>
body{margin:0;background:#020611;color:#00eaff;font-family:monospace;overflow:hidden}

#ui{position:absolute;top:10px;left:10px;width:340px}
.panel{background:rgba(0,20,40,.9);border:1px solid #00eaff;padding:10px;margin-bottom:10px}

#log{
position:absolute;bottom:0;left:0;right:0;height:180px;
background:black;border-top:1px solid #00eaff;
overflow:auto;font-size:12px;padding:6px
}

button{
width:100%;padding:8px;margin-top:5px;
background:#001820;color:#00eaff;border:1px solid #00eaff
}

h3{margin:0 0 6px 0;font-size:14px}
</style>
</head>

<body>

<div id="ui">

<div class="panel">
<h3>MISSION CONTROL</h3>
<button onclick="startCountdown()">LAUNCH</button>
<button onclick="speed=1">x1</button>
<button onclick="speed=5">x5</button>
<button onclick="speed=20">x20</button>
</div>

<div class="panel">
<h3>TELEMETRY</h3>
<div id="tele"></div>
</div>

</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.001,100)
camera.position.set(0,-2.2,1.2)
camera.lookAt(0,0,0)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0x666666))
const light=new THREE.DirectionalLight(0xffffff,1.5)
light.position.set(3,3,3)
scene.add(light)

// ===== EARTH =====
const earthRadius=0.15
const earth=new THREE.Mesh(
new THREE.SphereGeometry(earthRadius,64,64),
new THREE.MeshPhongMaterial({color:0x2266ff})
)
scene.add(earth)

// ===== MOON =====
const moonOrbitRadius=1
let moonAngle=0

const moon=new THREE.Mesh(
new THREE.SphereGeometry(0.05,32,32),
new THREE.MeshPhongMaterial({color:0xaaaaaa})
)
scene.add(moon)

// ===== ORBITS =====
function dashedOrbit(r,color){
let pts=[]
for(let i=0;i<=200;i++){
let a=i/200*Math.PI*2
pts.push(new THREE.Vector3(Math.cos(a)*r,Math.sin(a)*r,0))
}
let geo=new THREE.BufferGeometry().setFromPoints(pts)
let mat=new THREE.LineDashedMaterial({color:color,dashSize:0.04,gapSize:0.02})
let line=new THREE.Line(geo,mat)
line.computeLineDistances()
return line
}

scene.add(dashedOrbit(0.4,0x00ff00)) // Earth orbit
scene.add(dashedOrbit(moonOrbitRadius,0xffaa00)) // Moon orbit

// ===== LAGRANGE =====
function lagrange(x,y){
let m=new THREE.Mesh(
new THREE.SphereGeometry(0.015,12,12),
new THREE.MeshBasicMaterial({color:0xff00ff})
)
m.position.set(x,y,0)
scene.add(m)
}

// aproximación visual correcta
lagrange(0.8,0)
lagrange(1.2,0)
lagrange(0.5,0.87)
lagrange(0.5,-0.87)
lagrange(1.0,0)

// ===== SAT =====
const sat=new THREE.Mesh(
new THREE.SphereGeometry(0.02,16,16),
new THREE.MeshBasicMaterial({color:0xffffff})
)
scene.add(sat)

// ===== TRAIL =====
let trail=[]
const trailGeo=new THREE.BufferGeometry()
const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({color:0x00ffff}))
scene.add(trailLine)

// ===== STATE =====
let pos=new THREE.Vector2(earthRadius,0)
let vel=new THREE.Vector2(0,0)

let phase="IDLE"
let missionTime=0
let countdown=10
let speed=1

let distance=0
let temp=20

let orbitLock=false
let targetRadius=0.4

// ===== LOG =====
function log(m){
let el=document.getElementById("log")
el.innerHTML+="<br>T+"+missionTime.toFixed(1)+" | "+m
el.scrollTop=el.scrollHeight
}

// ===== START =====
function startCountdown(){
phase="COUNTDOWN"
countdown=10
log("Countdown started")
}

// ===== HELPERS =====
function distMoon(){
return Math.hypot(pos.x-moon.position.x,pos.y-moon.position.y)
}

// ===== AUTOPILOT =====
function autopilot(){

let r=pos.length()
let radial=pos.clone().normalize()
let tangent=new THREE.Vector2(-pos.y,pos.x).normalize()

switch(phase){

case "COUNTDOWN":
countdown-=0.1
if(countdown<=0){
log("Engine ignition")
phase="LIFTOFF"
}
break

case "LIFTOFF":
vel.add(radial.multiplyScalar(0.015))
if(r>0.25){
log("Gravity turn initiated")
phase="TURN"
}
break

case "TURN":
vel.add(tangent.multiplyScalar(0.01))
if(r>targetRadius){
log("Orbit insertion burn")
phase="ORBIT"
}
break

case "ORBIT":
let vOrbit=Math.sqrt(1/targetRadius)
vel.lerp(tangent.multiplyScalar(vOrbit),0.05)
orbitLock=true
if(Math.abs(r-targetRadius)<0.01){
log("Stable Earth orbit achieved")
phase="TLI"
}
break

case "TLI":
orbitLock=false
vel.multiplyScalar(1.12)
log("Executing Trans Lunar Injection")
phase="COAST"
break

case "COAST":
if(distMoon()<0.4){
log("Entering lunar influence")
phase="CAPTURE"
}
break

case "CAPTURE":
let dir=new THREE.Vector2(
pos.x-moon.position.x,
pos.y-moon.position.y
).normalize()

let tan=new THREE.Vector2(-dir.y,dir.x)
vel.copy(tan.multiplyScalar(0.3))
orbitLock=true
log("Lunar orbit stabilized")
phase="DONE"
break
}
}

// ===== PHYSICS =====
function step(dt){

if(phase==="IDLE") return

missionTime+=dt

// moon motion
moonAngle+=0.002
moon.position.set(
Math.cos(moonAngle)*moonOrbitRadius,
Math.sin(moonAngle)*moonOrbitRadius,
0
)

// gravity Earth
let dx=-pos.x, dy=-pos.y
let r=Math.hypot(dx,dy)+1e-5
vel.x+=dx/(r*r*r)*dt
vel.y+=dy/(r*r*r)*dt

// autopilot
autopilot()

// orbit lock
if(orbitLock){
let radial=pos.clone().normalize()
pos.copy(radial.multiplyScalar(targetRadius))
}

pos.x+=vel.x*dt
pos.y+=vel.y*dt

distance+=vel.length()*dt*1000
temp=20+vel.length()*40

// ===== TELEMETRY =====
document.getElementById("tele").innerHTML=
"Phase: "+phase+"<br>"+
"Velocity: "+vel.length().toFixed(3)+"<br>"+
"Altitude: "+(pos.length()-earthRadius).toFixed(3)+"<br>"+
"Orbit Error: "+Math.abs(pos.length()-targetRadius).toFixed(3)+"<br>"+
"Moon Dist: "+distMoon().toFixed(3)+"<br>"+
"Temp: "+temp.toFixed(1)+" C<br>"+
"Distance: "+distance.toFixed(0)+" km"
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate)

for(let i=0;i<speed;i++){
step(0.01)
}

trail.push(new THREE.Vector3(pos.x,pos.y,0))
if(trail.length>4000) trail.shift()
trailGeo.setFromPoints(trail)

sat.position.set(pos.x,pos.y,0)

controls.update()
renderer.render(scene,camera)
}

animate()

</script>
</body>
</html>
