<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mission Control V23</title>

<style>
body{margin:0;background:#020611;color:#00eaff;font-family:monospace;overflow:hidden}

#ui{position:absolute;top:10px;left:10px;width:340px}
.panel{background:rgba(0,20,40,.9);border:1px solid #00eaff;padding:10px;margin-bottom:10px}

#log{
position:absolute;bottom:0;left:0;right:0;height:180px;
background:black;border-top:1px solid #00eaff;
overflow:auto;font-size:12px;padding:6px
}

button{
width:100%;padding:6px;margin-top:4px;
background:#001820;color:#00eaff;border:1px solid #00eaff
}

h3{margin:0 0 6px 0;font-size:14px}
</style>
</head>

<body>

<div id="ui">

<div class="panel">
<h3>MISSION CONTROL</h3>
<button onclick="setPhase('COUNTDOWN')">COUNTDOWN</button>
<button onclick="setPhase('LIFTOFF')">LIFTOFF</button>
<button onclick="setPhase('TURN')">GRAVITY TURN</button>
<button onclick="setPhase('ORBIT')">ORBIT INSERTION</button>
<button onclick="lockEarthOrbit()">LOCK EARTH ORBIT</button>
<button onclick="setPhase('TLI')">TLI</button>
<button onclick="setPhase('COAST')">COAST</button>
<button onclick="setPhase('CAPTURE')">LUNAR CAPTURE</button>
<button onclick="lockMoonOrbit()">LOCK LUNAR ORBIT</button>

<button onclick="speed=1">x1</button>
<button onclick="speed=5">x5</button>
<button onclick="speed=20">x20</button>
</div>

<div class="panel">
<h3>TELEMETRY</h3>
<div id="tele"></div>
</div>

</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.001,100)
camera.position.set(0,-2.5,1.5)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0x666666))
const light=new THREE.DirectionalLight(0xffffff,1.2)
light.position.set(3,3,3)
scene.add(light)

// ===== EARTH =====
const earthRadius=0.12
const earth=new THREE.Mesh(
new THREE.SphereGeometry(earthRadius,64,64),
new THREE.MeshPhongMaterial({color:0x2266ff})
)
scene.add(earth)

// ===== MOON =====
const moonRadius=0.04
const moonOrbitRadius=1
let moonAngle=0

const moon=new THREE.Mesh(
new THREE.SphereGeometry(moonRadius,32,32),
new THREE.MeshPhongMaterial({color:0xaaaaaa})
)
scene.add(moon)

// ===== ORBITS =====
function dashedOrbit(r,color){
let pts=[]
for(let i=0;i<=200;i++){
let a=i/200*Math.PI*2
pts.push(new THREE.Vector3(Math.cos(a)*r,Math.sin(a)*r,0))
}
let geo=new THREE.BufferGeometry().setFromPoints(pts)
let mat=new THREE.LineDashedMaterial({color:color,dashSize:0.03,gapSize:0.02})
let line=new THREE.Line(geo,mat)
line.computeLineDistances()
return line
}

scene.add(dashedOrbit(0.35,0x00ff00))
scene.add(dashedOrbit(moonOrbitRadius,0xffaa00))

// ===== LAGRANGE =====
function lagrange(x,y){
let p=new THREE.Mesh(
new THREE.SphereGeometry(0.01,8,8),
new THREE.MeshBasicMaterial({color:0xff00ff})
)
p.position.set(x,y,0)
scene.add(p)
}

// aproximación simple
lagrange(0.85,0)
lagrange(1.15,0)
lagrange(0.5,0.86)
lagrange(0.5,-0.86)
lagrange(1,0)

// ===== SAT =====
const sat=new THREE.Mesh(
new THREE.SphereGeometry(0.01,16,16),
new THREE.MeshBasicMaterial({color:0xffffff})
)
scene.add(sat)

// ===== TRAIL =====
let trail=[]
const trailGeo=new THREE.BufferGeometry()
const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({color:0x00ffff}))
scene.add(trailLine)

// ===== STATE =====
let pos=new THREE.Vector2(earthRadius,0)
let vel=new THREE.Vector2(0,0)

let phase="IDLE"
let speed=1

let distance=0
let temp=20

let earthLock=false
let moonLock=false

// ===== CONTROL =====
function setPhase(p){
phase=p
log("Phase set: "+p)
}

function lockEarthOrbit(){
earthLock=true
moonLock=false
log("Earth orbit locked")
}

function lockMoonOrbit(){
earthLock=false
moonLock=true
log("Lunar orbit locked")
}

// ===== LOG =====
function log(m){
let el=document.getElementById("log")
el.innerHTML+="<br>> "+m
el.scrollTop=el.scrollHeight
}

// ===== HELPERS =====
function distMoon(){
return Math.hypot(pos.x-moon.position.x,pos.y-moon.position.y)
}

// ===== PHYSICS =====
function step(dt){

// moon motion
moonAngle+=0.003
moon.position.set(
Math.cos(moonAngle)*moonOrbitRadius,
Math.sin(moonAngle)*moonOrbitRadius,
0
)

// directions
let r=pos.length()
let radial=pos.clone().normalize()
let tangent=new THREE.Vector2(-pos.y,pos.x).normalize()

// ===== PHASE ACTIONS =====
if(phase==="LIFTOFF") vel.add(radial.multiplyScalar(0.01))
if(phase==="TURN") vel.add(tangent.multiplyScalar(0.01))
if(phase==="ORBIT"){
let v=Math.sqrt(1/0.35)
vel.lerp(tangent.multiplyScalar(v),0.05)
}
if(phase==="TLI") vel.multiplyScalar(1.02)
if(phase==="CAPTURE") vel.multiplyScalar(0.98)

// ===== LOCKS =====
if(earthLock){
let r=0.35
let tangent=new THREE.Vector2(-pos.y,pos.x).normalize()
pos.normalize().multiplyScalar(r)
vel.copy(tangent.multiplyScalar(Math.sqrt(1/r)))
}

if(moonLock){
let dx=pos.x-moon.position.x
let dy=pos.y-moon.position.y
let dir=new THREE.Vector2(dx,dy).normalize()
let tan=new THREE.Vector2(-dir.y,dir.x)

pos.set(
moon.position.x+dir.x*0.2,
moon.position.y+dir.y*0.2
)
vel.copy(tan.multiplyScalar(0.25))
}

// ===== GRAVITY =====
let dx=-pos.x, dy=-pos.y
let dist=Math.hypot(dx,dy)+1e-5
vel.x+=dx/(dist*dist*dist)*dt
vel.y+=dy/(dist*dist*dist)*dt

dx=moon.position.x-pos.x
dy=moon.position.y-pos.y
dist=Math.hypot(dx,dy)+1e-5
vel.x+=0.0123*dx/(dist*dist*dist)*dt
vel.y+=0.0123*dy/(dist*dist*dist)*dt

pos.x+=vel.x*dt
pos.y+=vel.y*dt

distance+=vel.length()*dt*1000
temp=20+vel.length()*40

// ===== TELEMETRY =====
document.getElementById("tele").innerHTML=
"Phase: "+phase+"<br>"+
"Velocity: "+vel.length().toFixed(3)+"<br>"+
"Altitude: "+(pos.length()-earthRadius).toFixed(3)+"<br>"+
"Orbit Error: "+Math.abs(pos.length()-0.35).toFixed(3)+"<br>"+
"Moon Dist: "+distMoon().toFixed(3)+"<br>"+
"Temp: "+temp.toFixed(1)+" C<br>"+
"Distance: "+distance.toFixed(0)+" km"
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate)

for(let i=0;i<speed;i++){
step(0.01)
}

trail.push(new THREE.Vector3(pos.x,pos.y,0))
if(trail.length>4000) trail.shift()
trailGeo.setFromPoints(trail)

sat.position.set(pos.x,pos.y,0)

controls.update()
renderer.render(scene,camera)
}

animate()

</script>
</body>
</html>
