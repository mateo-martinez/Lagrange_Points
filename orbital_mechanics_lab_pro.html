<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Orbital Mechanics Lab Pro</title>

<style>

body{
margin:0;
background:#03030a;
color:white;
font-family:Arial;
overflow:hidden;
}

#ui{

position:absolute;
top:10px;
left:10px;

background:rgba(0,0,0,0.7);
padding:12px;
border-radius:10px;
width:250px;

}

canvas{
display:block;
}

button,select,input{
margin:4px;
width:100%;
}

</style>

</head>

<body>

<div id="ui">

<b>Orbital Mechanics Lab</b>

<hr>

System

<select id="system">

<option value="earthmoon">Earth – Moon</option>
<option value="sunearth">Sun – Earth</option>

</select>

Speed

<input type="range" id="speed" min="0.1" max="5" step="0.1" value="1">

<hr>

<button onclick="spawnProbe()">Add spacecraft</button>
<button onclick="spawnHalo()">Halo orbit</button>
<button onclick="spawnTrojan()">Trojan swarm</button>
<button onclick="clearAll()">Clear objects</button>

<hr>

<label>
<input type="checkbox" id="potential" checked>
Potential field
</label>

<label>
<input type="checkbox" id="rotateFrame" checked>
Rotating frame
</label>

<hr>

Jacobi Constant

<div id="jacobi">--</div>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let cx=canvas.width/2
let cy=canvas.height/2

let probes=[]
let trails=[]

const systems={

earthmoon:{
m1:5.972e24,
m2:7.348e22,
scale:260,
color1:"#3fa9ff",
color2:"#bbbbbb",
name1:"Earth",
name2:"Moon"
},

sunearth:{
m1:1.989e30,
m2:5.972e24,
scale:260,
color1:"#ffaa00",
color2:"#3fa9ff",
name1:"Sun",
name2:"Earth"
}

}

function system(){
return systems[document.getElementById("system").value]
}

function mu(){

let s=system()

return s.m2/(s.m1+s.m2)

}

function computeLagrange(m){

let L1=1-Math.cbrt(m/3)
let L2=1+Math.cbrt(m/3)
let L3=-1-(5*m/12)

return{

L1:{x:L1,y:0},
L2:{x:L2,y:0},
L3:{x:L3,y:0},

L4:{
x:0.5-m,
y:Math.sqrt(3)/2
},

L5:{
x:0.5-m,
y:-Math.sqrt(3)/2
}

}

}

function spawnProbe(){

probes.push({
x:Math.random()*0.5,
y:(Math.random()-0.5)*0.5,
vx:0,
vy:0
})

trails.push([])

}

function spawnHalo(){

let m=mu()

probes.push({

x:1-m+0.02,
y:0,
vx:0,
vy:0.15

})

trails.push([])

}

function spawnTrojan(){

let m=mu()

for(let i=0;i<30;i++){

probes.push({

x:0.5-m+(Math.random()-0.5)*0.05,
y:Math.sqrt(3)/2+(Math.random()-0.5)*0.05,
vx:0,
vy:0

})

trails.push([])

}

}

function clearAll(){

probes=[]
trails=[]

}

function rot(x,y){

let scale=system().scale

return{

x:cx+x*scale,
y:cy+y*scale

}

}

function updateProbes(){

let m=mu()

for(let i=0;i<probes.length;i++){

let p=probes[i]

let dx1=p.x+m
let dy1=p.y

let dx2=p.x-(1-m)
let dy2=p.y

let r1=Math.sqrt(dx1*dx1+dy1*dy1)
let r2=Math.sqrt(dx2*dx2+dy2*dy2)

let ax=p.x+2*p.vy-(1-m)*dx1/(r1*r1*r1)-m*dx2/(r2*r2*r2)
let ay=p.y-2*p.vx-(1-m)*dy1/(r1*r1*r1)-m*dy2/(r2*r2*r2)

let dt=0.004*document.getElementById("speed").value

p.vx+=ax*dt
p.vy+=ay*dt

p.x+=p.vx
p.y+=p.vy

trails[i].push({x:p.x,y:p.y})

if(trails[i].length>500)
trails[i].shift()

let C=2*((1-m)/r1+m/r2)+p.x*p.x+p.y*p.y-(p.vx*p.vx+p.vy*p.vy)

document.getElementById("jacobi").innerText=C.toFixed(3)

}

}

function drawBodies(){

let m=mu()

let b1=rot(-m,0)
let b2=rot(1-m,0)

let s=system()

ctx.beginPath()
ctx.arc(b1.x,b1.y,18,0,Math.PI*2)
ctx.fillStyle=s.color1
ctx.fill()

ctx.beginPath()
ctx.arc(b2.x,b2.y,8,0,Math.PI*2)
ctx.fillStyle=s.color2
ctx.fill()

ctx.fillText(s.name1,b1.x+20,b1.y)
ctx.fillText(s.name2,b2.x+10,b2.y)

}

function drawLagrange(){

let lag=computeLagrange(mu())

for(let k in lag){

let p=rot(lag[k].x,lag[k].y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

ctx.fillText(k,p.x+6,p.y)

}

}

function drawTrails(){

for(let i=0;i<trails.length;i++){

let trail=trails[i]

ctx.beginPath()

for(let j=0;j<trail.length;j++){

let p=rot(trail[j].x,trail[j].y)

if(j==0)
ctx.moveTo(p.x,p.y)
else
ctx.lineTo(p.x,p.y)

}

ctx.strokeStyle="#00ffd0"
ctx.stroke()

}

}

function drawProbes(){

for(let p of probes){

let pr=rot(p.x,p.y)

ctx.beginPath()
ctx.arc(pr.x,pr.y,3,0,Math.PI*2)
ctx.fillStyle="#00ffd0"
ctx.fill()

}

}

function drawPotential(){

if(!document.getElementById("potential").checked)
return

let m=mu()

let step=30

for(let x=0;x<canvas.width;x+=step){

for(let y=0;y<canvas.height;y+=step){

let nx=(x-cx)/system().scale
let ny=(y-cy)/system().scale

let r1=Math.sqrt((nx+m)**2+ny**2)
let r2=Math.sqrt((nx-(1-m))**2+ny**2)

let U=0.5*(nx*nx+ny*ny)+(1-m)/r1+m/r2

let bright=Math.min(1,U*0.4)

ctx.fillStyle="rgba(0,120,255,"+bright+")"
ctx.fillRect(x,y,step,step)

}

}

}

function frame(){

requestAnimationFrame(frame)

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPotential()

drawBodies()

drawLagrange()

updateProbes()

drawTrails()

drawProbes()

}

frame()

</script>

</body>
</html>
